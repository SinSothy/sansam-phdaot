version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: phdaot-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-phdaot}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: phdaot-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data
    restart: unless-stopped

  backend:
    build:
      context: ./phdaot-backend
      dockerfile: Dockerfile.dev
    container_name: phdaot-backend-dev
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-phdaot}
      - NODE_ENV=development
    volumes:
      - ./phdaot-backend:/app
      - /app/node_modules
    depends_on:
      - db
      - minio
    restart: unless-stopped

  frontend:
    build:
      context: ./Phdaot
      dockerfile: Dockerfile.dev
    container_name: phdaot-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # Expose backend URL to frontend if needed
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    volumes:
      - ./Phdaot:/app
      # Prevent overwriting node_modules
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data_dev:
  minio_data_dev:

networks:
  default:
    name: phdaot_dev_network
    driver: bridge
